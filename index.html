<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<style>

:root{
    --gold:#c7a86d;
    --cream:#f8f4ee;
    --dark:#1f1f1f;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top, #2b2b2b 0%, #121212 100%);
    font-family: "Georgia", serif;
    color:white;
    overflow-x:hidden;
}

/* PASSWORD SCREEN */

#passwordScreen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
    z-index:999;
}

.password-card{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(20px);
    padding:40px;
    border-radius:24px;
    text-align:center;
    box-shadow:0 25px 80px rgba(0,0,0,.4);
}

.password-card h1{
    color:var(--gold);
    margin-bottom:15px;
    font-weight:normal;
}

.password-card p{
    opacity:.8;
    margin-bottom:25px;
}

.password-card input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    margin-bottom:15px;
    font-size:16px;
}

.password-card button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:var(--gold);
    color:black;
    font-weight:bold;
    cursor:pointer;
}

.error{
    color:#ff7d7d;
    margin-top:12px;
}

/* MAIN */

#site{
    display:none;
}

.hero{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

/* TITLE */

.subtitle{
    letter-spacing:5px;
    color:var(--gold);
    margin-bottom:10px;
}

.title{
    font-size:clamp(2.5rem,6vw,5rem);
    text-align:center;
    margin-bottom:50px;
    font-weight:normal;
}

/* BOOK */

.book{
    width:min(90vw,420px);
    aspect-ratio:3/4;
    perspective:2200px;
    position:relative;
}

.inside{
    position:absolute;
    inset:0;
    background:white;
    border-radius:8px;
    overflow:hidden;
    box-shadow:
    0 15px 60px rgba(0,0,0,.5);
}

.inside img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.cover{
    position:absolute;
    inset:0;
    transform-origin:left center;
    transition:transform 1.3s cubic-bezier(.22,.61,.36,1);
    transform-style:preserve-3d;
}

.book:hover .cover{
    transform:rotateY(-165deg);
}

.book.open .cover{
    transform:rotateY(-165deg);
}

.page{
    position:absolute;
    inset:0;
    backface-visibility:hidden;
    overflow:hidden;
    border-radius:8px;
    box-shadow:
    0 15px 60px rgba(0,0,0,.6);
}

.page img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.back{
    transform:rotateY(180deg);
}

/* CONTENT */

.content{
    margin-top:70px;
    text-align:center;
    max-width:700px;
    padding:0 20px;
}

.content h2{
    color:var(--gold);
    margin-bottom:20px;
    font-weight:normal;
}

.content p{
    line-height:1.8;
    opacity:.9;
}

/* COUNTDOWN */

.countdown{
    margin-top:40px;
    display:flex;
    gap:20px;
    justify-content:center;
    flex-wrap:wrap;
}

.timebox{
    min-width:90px;
    padding:18px;
    border:1px solid rgba(255,255,255,.1);
    border-radius:16px;
    background:rgba(255,255,255,.03);
}

.timebox span{
    display:block;
}

.number{
    font-size:2rem;
    color:var(--gold);
}

/* RSVP */

.rsvp{
    margin-top:40px;
}

.rsvp a{
    text-decoration:none;
    background:var(--gold);
    color:black;
    padding:16px 32px;
    border-radius:999px;
    font-weight:bold;
    display:inline-block;
    transition:.3s;
}

.rsvp a:hover{
    transform:translateY(-2px);
}

/* FOOTER */

footer{
    text-align:center;
    padding:60px 20px;
    opacity:.6;
}

</style>
</head>
<body>

<!-- PASSWORD -->

<div id="passwordScreen">

    <div class="password-card">
        <h1>Wedding Invitation</h1>

        <p>Please enter the invitation password</p>

        <input
        type="password"
        id="passwordInput"
        placeholder="Enter Password">

        <button onclick="checkPassword()">
            Open Invitation
        </button>

        <div class="error" id="error"></div>
    </div>

</div>

<!-- SITE -->

<div id="site">

<section class="hero">

    <div class="subtitle">
        YOU ARE INVITED
    </div>

    <h1 class="title">
        Our Wedding Day
    </h1>

    <div class="book" id="book">

        <div class="inside">
            <img src="../card/res/3.png" alt="">
        </div>

        <div class="cover">

            <div class="page front">
                <img src="../card/res/1.png" alt="">
            </div>

            <div class="page back">
                <img src="../card/res/2.png" alt="">
            </div>

        </div>

    </div>

    <div class="content">

        <h2>Touch or Hover to Open</h2>

        <p>
            We are delighted to share this special day with our family and friends.
            Open the invitation above to view the details.
        </p>

        <div class="countdown">

            <div class="timebox">
                <span class="number" id="days">0</span>
                <span>Days</span>
            </div>

            <div class="timebox">
                <span class="number" id="hours">0</span>
                <span>Hours</span>
            </div>

            <div class="timebox">
                <span class="number" id="minutes">0</span>
                <span>Minutes</span>
            </div>

        </div>

        <!--<div class="rsvp">
            <a href="#">
                RSVP
            </a>
        </div>-->

    </div>

</section>

<footer>
    With Love ♥
</footer>

</div>

<script>

/* CHANGE PASSWORD HERE */

const CORRECT_PASSWORD = "Wedding2026";

/* CHANGE WEDDING DATE HERE */

const weddingDate =
new Date("2026-06-20T17:00:00");

function checkPassword(){

    const input =
    document.getElementById("passwordInput").value;

    if(input === CORRECT_PASSWORD){

        document.getElementById(
        "passwordScreen").style.display="none";

        document.getElementById(
        "site").style.display="block";

    } else {

        document.getElementById(
        "error").textContent =
        "Incorrect password";

    }
}

document.getElementById("passwordInput")
.addEventListener("keypress",e=>{
    if(e.key==="Enter"){
        checkPassword();
    }
});

/* MOBILE TAP */

const book =
document.getElementById("book");

book.addEventListener("click",()=>{
    book.classList.toggle("open");
});

/* COUNTDOWN */

function updateCountdown(){

    const now = new Date();

    const diff =
    weddingDate - now;

    if(diff <= 0) return;

    const days =
    Math.floor(diff / 86400000);

    const hours =
    Math.floor(diff % 86400000 / 3600000);

    const minutes =
    Math.floor(diff % 3600000 / 60000);

    document.getElementById("days").textContent = days;
    document.getElementById("hours").textContent = hours;
    document.getElementById("minutes").textContent = minutes;
}

updateCountdown();

setInterval(
updateCountdown,
60000
);

</script>

</body>
</html>
