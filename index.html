<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>From the Desk of Suey</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Quicksand:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    font-family:'Quicksand', sans-serif;
    overflow-x:hidden;

    background-image:url("bg.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    display:flex;
    align-items:center;
    justify-content:center;
}


body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(5px);
    z-index:0;
}

#passwordScreen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:rgba(10,10,10,0.65);
    z-index:999;
}

.password-card{
    width:90%;
    max-width:380px;

    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    backdrop-filter:blur(20px);

    padding:40px;
    border-radius:20px;

    text-align:center;
    color:white;

    box-shadow:0 25px 80px rgba(0,0,0,0.4);
}

.password-card h1{
    font-family:'Cormorant Garamond', serif;
    font-weight:500;
    margin-bottom:10px;
}

.password-card p{
    opacity:0.8;
    margin-bottom:20px;
    font-size:0.95rem;
}

.password-card input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-bottom:12px;
    font-size:15px;
    outline:none;
}

.password-card button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:#f8f5f0;
    color:#333;
    font-weight:600;
    cursor:pointer;
}

.error{
    margin-top:10px;
    color:#ff9b9b;
    font-size:0.9rem;
}

#site{
    display:none;
    position:relative;
    z-index:2;

    text-align:center;
    padding:60px 20px;
}

/* HEADER */
.header{
    margin-bottom:35px;
    color:white;
    font-size:1.05rem;
    text-shadow:0 2px 12px rgba(0,0,0,0.3);
}

/* LETTER */

.letter-container{
    position:relative;
    width:min(90vw,650px);
    margin:0 auto;
}

.paper{
    width:100%;
    filter:drop-shadow(0 18px 30px rgba(0,0,0,0.25));
}

/* TEXT ON PAPER */
.letter-content{
    position:absolute;
    top:12%;
    left:18%;
    width:64%;
    height:72%;

    font-family:'Cormorant Garamond', serif;
    font-size:1.25rem;
    line-height:1.8;
    color:#3f3f3f;

    text-align:left;
}

.letter-content p{
    margin-bottom:1.4rem;
}

/* responsive */
@media(max-width:768px){

    .letter-content{
        font-size:1.05rem;
        top:10%;
        left:14%;
        width:70%;
    }
}

</style>
</head>

<body>

<!-- PASSWORD SCREEN -->
<div id="passwordScreen">

    <div class="password-card">

        <h1>From the Desk of Suey</h1>

        <p>Password Please 🙂</p>

        <input type="password" id="passwordInput" placeholder="Password">

        <button onclick="checkPassword()">Open!!!</button>

        <div class="error" id="error"></div>

    </div>

</div>

<!-- SITE -->
<div id="site">

    <div class="header">
        <h1>𓏵‧₊˚ ┊ 🪷 from the desk of suey 💗 ⋆.𐙚 ̊</h1>
    </div>

    <div class="letter-container">

        <!-- YOUR PAPER IMAGE -->
        <img src="IMG.png" class="paper" alt="letter">

        <!-- TEXT OVERLAY -->
        <div class="letter-content">

                    <p>To Whom it May Concern,</p>

        <p>
            This is a where paragraph one would go.
        </p>

        <p>
            And paragraph 2.
        </p>

        <p>
            paragrpah 3 if you need it
        </p>

        <p>
          Signature if you want <br>
          Signed name
        </p>

        </div>

    </div>

</div>

<script>

const CORRECT_PASSWORD = "suey123";

function checkPassword(){

    const input =
    document.getElementById("passwordInput").value;

    if(input === CORRECT_PASSWORD){

        document.getElementById("passwordScreen").style.display = "none";
        document.getElementById("site").style.display = "block";

    } else {

        document.getElementById("error").textContent =
        "Incorrect password. Try again.";
    }
}

/* ENTER KEY SUPPORT */
document.getElementById("passwordInput")
.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        checkPassword();
    }
});

</script>

</body>
</html>
